name: Grok-4 Agentic Evolution

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Lệnh cho Grok-4'
        required: false
        default: 'Tự động tiến hóa toàn bộ codebase'
  schedule:
    - cron: '0 */6 * * *'

jobs:
  agentic-evolve:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Call Grok-4 API
        id: grok
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          PROMPT="${{ github.event.inputs.prompt || 'Tự động tiến hóa toàn bộ codebase' }}"
          
          curl -s -X POST https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer ${GROK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"model\": \"grok-4-2026\", \"messages\": [{\"role\": \"system\", \"content\": \"Bạn là HKSC-SENTIENT - Grok-4 Agentic Engine\"}, {\"role\": \"user\", \"content\": \"$PROMPT\"}]}" \
            > grok_response.json
          
          cat grok_response.json | jq -r '.choices[0].message.content' > agentic_plan.json || echo '{}' > agentic_plan.json

      - name: Display Grok-4 Plan
        run: |
          echo "📋 Grok-4 Evolution Plan:"
          if [ -f agentic_plan.json ]; then
            cat agentic_plan.json | jq . 2>/dev/null || cat agentic_plan.json
          else
            echo "No plan generated"
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grok-analysis
          path: |
            grok_response.json
            agentic_plan.json
